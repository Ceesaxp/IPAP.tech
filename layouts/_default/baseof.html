<!DOCTYPE html>
<html lang="{{ or site.LanguageCode "en" }}" itemscope itemtype="http://schema.org/WebPage">
  <head>
    {{ partial "head.html" . }}
  </head>
  <body class="{{ if .IsHome }}is-home{{ end }} {{ with .Type }}type-{{ . }}{{ end }}">
    {{ partial "nav.html" . }}
    <main id="main">
      {{ block "main" . }}{{ end }}
    </main>
    {{ partial "footer.html" . }}
    {{ partial "scripts.html" . }}
  </body>
</html>
